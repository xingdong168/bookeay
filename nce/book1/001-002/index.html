ass="text-block hidden">Excuse me!Yes?Is this your handbag?Pardon?Is this your handbag?Yes, it is.Thank you very much.</div><p style="text-align:center;font-size:12px;color:#999;margin-top:8px">👆 文字已模糊，先听录音再看</p></div></div><div class="bottom-btn-area"><button class="btn-primary">继续 →</button></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"lesson":{"id":279,"title":"新概念英语 - 第1册 - 第001-002课Excuse me! 对不起！","book":"第1册","lesson_num":"001-002","lesson_start":"001","lesson_end":"002","eng_title":"Excuse me! 对不起！","link":"https://www.xingdong168.com/archives/279","audio_url":"https://r2.xingdong168.com/%E6%96%B0%E6%A6%82%E5%BF%B5%E8%8B%B1%E8%AF%AD%E7%AC%AC%E4%B8%80%E5%86%8C%E5%BD%95%E9%9F%B3/001%26002%EF%BC%8DExcuse%20Me.mp3","sections":{"text_en":"Excuse me!Yes?Is this your handbag?Pardon?Is this your handbag?Yes, it is.Thank you very much.","vocab":["excuse v. 原谅 me pron.我(宾格) yes adv. 是的 is v. be 动词现在时第三人称单数 this pron.这 your possessive adjective 你的，你们的 handbag n. （女用）手提包 pardon int. 原谅，请再说一遍 it pron.它 thank you 感谢你（们） very much 非常地"],"text_cn":"对不起什么事？这是您的手提包吗？对不起，请再说一遍。这是您的手提包吗？是的，是我的。非常感谢！","notes":"1．Excuse me 对不起。\n\n\n\n这是常用于表示道歉的客套话，相当于汉语中的“劳驾”、“对不起”。当我们要引起别人的注意、要打搅别人或打断别人的话时，通常都可使用这一表达方式。在课文中，男士为了吸引女士的注意而使用了这句客套话。它也可用在下列场合：向陌生人问路，借用他人的电话，从别人身边挤过，在宴席或会议中途要离开一会儿等等。\n\n\n\n2．Yes？什么事？\n\n\n\n课文中的 Yes？应用升调朗读，意为：“什么事？”Yes？以升调表示某种不肯定或询问之意，也含有请对方说下去的意思。\n\n\n\n3．Pardon？对不起，请再说一遍。\n\n\n\n当我们没听清或没理解对方的话并希望对方能重复一遍时，就可以使用这一表达方式。较为正式的说法是：\n\n\n\nI beg your pardon.\n\n\n\nI beg your pardon?\n\n\n\nPardon me.\n\n\n\n它们在汉语中的意思相当于“对不起，请再说一遍”或者“对不起，请再说一遍好吗？”\n\n\n\n4．Thank you very much．非常感谢！\n\n\n\n这是一句表示感谢的用语，意为“非常感谢（你）”。请看下列类似的表达式，并注意其语气上的差异：\n\n\n\nThank you. 谢谢（你）。\n\n\n\nThanks! 谢谢！\n\n\n\n5．数字1～10的英文写法\n\n\n\n1--one  2--two 3--three 4--four 5--five\n\n\n\n6--six 7--seven  8--eight 9--nine 10--ten","vocab2":["pen n.钢笔","pencil n.铅笔","book n.书","watch n.手表","coat n.上衣，外衣","dress n.连衣裙","skirt n.裙子","shirt n.衬衣","car n.小汽车","house n.房子"]}}},"__N_SSG":true},"page":"/nce/book1/[id]","query":{"id":"001-002"},"buildId":"K5HeUjPL4pkYMZquwyrjC","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
