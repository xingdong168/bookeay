v class="text-block hidden">My coat and my umbrella please.Here is my ticket.Thank you, sir.Number five.Here&#x27;s your umbrella and your coat.This is not my umbrella.Sorry sir.Is this your umbrella?No, it isn&#x27;t.Is this it?Yes, it is.Thank you very much.</div><p style="text-align:center;font-size:12px;color:#999;margin-top:8px">👆 文字已模糊，先听录音再看</p></div></div><div class="bottom-btn-area"><button class="btn-primary">继续 →</button></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"lesson":{"id":282,"title":"新概念英语 - 第1册 - 第003-004课Sorry, sir. 对不起，先生","book":"第1册","lesson_num":"003-004","lesson_start":"003","lesson_end":"004","eng_title":"Sorry, sir. 对不起，先生","link":"https://www.xingdong168.com/archives/282","audio_url":"https://r2.xingdong168.com/%E6%96%B0%E6%A6%82%E5%BF%B5%E8%8B%B1%E8%AF%AD%E7%AC%AC%E4%B8%80%E5%86%8C%E5%BD%95%E9%9F%B3/003%26004%EF%BC%8DSorry%2C%20Sir..mp3","sections":{"text_en":"My coat and my umbrella please.Here is my ticket.Thank you, sir.Number five.Here's your umbrella and your coat.This is not my umbrella.Sorry sir.Is this your umbrella?No, it isn't.Is this it?Yes, it is.Thank you very much.","vocab":["umbrella n. 伞 please int. 请 here adv. 这里 my possessive adjective 我的 ticket n. 票 number n. 号码 five num. 五 sorry adj. 对不起的 sir n. 先生 cloakroom n. 衣帽存放处"],"text_cn":"请把我的大衣和伞拿给我。这是我（寄存东西）的牌子。谢谢，先生。是5号。这是您的伞和大衣这不是我的伞。对不起，先生。这把伞是您的吗？不，不是！这把是吗？是，是这把非常感谢。","notes":"1．My coat and my umbrella please. 请把我的大衣和伞拿给我。\n\n\n\n这是一个省略形式的祈使句，完整的句子应为：\n\n\n\nGive me my coat and my umbrella, please.\n\n\n\n口语中，在语境明确的情况下通常可省略动词和间接宾语，如：\n\n\n\n(Show me your) Ticket, please. 请出示你的票。\n\n\n\n(Show me your)Passport, please.请出示您的护照。\n\n\n\n2．Here 's your umbrella and your coat. 这是您的伞和大衣。\n\n\n\nHere 's 是 Here is的缩略形式。全句原为：Here is your umbrella and your coat．缩略形式和非缩略形式在英语的书面用语和口语中均有，但非缩略形式常用于比较正式的场合。Here 's…是一种习惯用法，句中采用了倒装句式，即系动词提到了主语之前。又如 Here is my ticket 这句话用正常的语序时为 My ticket is here。\n\n\n\n3．Sorry = I 'm sorry。\n\n\n\n这是口语中的缩略形式，通常在社交场合中用于表示对他人的歉意或某种程度的遗憾。\n\n\n\nSorry 和 Excuse me 虽在汉语中都可作“对不起”讲，但 sorry 常用于对自己所犯过失表示道歉，而 Excuse me 则多为表示轻微歉意的客套语。\n\n\n\n4．Sir，先生。\n\n\n\n这是英语中对不相识的男子、年长者或上级的尊称。例如：在服务行业中，服务员对男顾客的称呼通常为 sir：\n\n\n\nWhat can I do for you, sir? 先生，您要买什么？\n\n\n\nThank you, sir.谢谢您，先生。\n\n\n\nsir 通常用于正式信函开头的称呼中：\n\n\n\nDear sir亲爱的先生\n\n\n\nDear sirs 亲爱的先生们／诸位先生们\n\n\n\nSir可用于有爵士称号者的名字或姓名之前（但不用于姓氏之前）：\n\n\n\nSir Winston Churchill 温斯顿·丘吉尔爵士\n\n\n\nSir William Brown 威廉·布朗爵士\n\n\n\n5．数字11～15的英文写法\n\n\n\n11-eleven 12-twelve 13-thirteen\n\n\n\n14-fourteen 15-fifteen\n\n\n\n语法 Grammar in use\n\n\n\n否定句\n\n\n\n否定陈述句与肯定陈述句相反，它表示“否定”，并且含有一个如not 之类的否定词。一个内含be的否定形式的陈述句，应在其后加 not，以构成否定句：\n\n\n\n肯定句：This is my umbrella.这是我的伞。\n\n\n\n否定句：This is not my umbrella.这不是我的伞。\n\n\n\n请再看课文中的这两句话：\n\n\n\n针对一般疑问句的否定的简略答语是 No，it 's not／it isn 't。此处省略和非省略形式的关系为：is not =isn 't；it is = it 's。全句应为：\n\n\n\nNo, it is not my umbrella.不，它不是我的伞。\n\n\n\n词汇学习 Word study\n\n\n\n1．suit n.（一套）衣服：\n\n\n\nIs this your suit?这是你的衣服吗？\n\n\n\na man 's suit 一套男装\n\n\n\na woman 's suit 一套女装\n\n\n\n2．please interjection（表示有礼貌地请求对方）请；烦劳：\n\n\n\nMy coat and my umbrella please.请把我的大衣和伞拿给我。\n\n\n\nPlease come in.请进。"}}},"__N_SSG":true},"page":"/nce/book1/[id]","query":{"id":"003-004"},"buildId":"ZkfvibttRw9QNY9DuGJzy","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
